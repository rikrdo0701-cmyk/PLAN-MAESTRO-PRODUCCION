name: Desplegar frontend en GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "src/web/**"
      - "scripts/build-appscript.mjs"
      - "package.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run check
      - run: npm run build
      - name: Renovar cache del frontend
        env:
          BUILD_SHA: ${{ github.sha }}
        run: |
          node -e 'const fs=require("fs"); const p="site/sw.js"; let s=fs.readFileSync(p,"utf8"); const v=process.env.BUILD_SHA.slice(0,12); s=s.replace(/const CACHE_NAME = "[^"]+";/, `const CACHE_NAME = "plan-maestro-${v}";`); fs.writeFileSync(p,s);'
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
