name: Desplegar frontend en GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "src/web/**"
      - "tests/**"
      - "scripts/build-appscript.mjs"
      - "scripts/check-project.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test
      - run: npm run check
      - run: npm run build
      - name: Verificar frontend generado
        run: |
          test -f site/index.html
          grep -q "PlannerCore" site/index.html
          grep -q "scheduleCurrentPlan" site/index.html
          grep -q "subcontractWindowEnd" site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
