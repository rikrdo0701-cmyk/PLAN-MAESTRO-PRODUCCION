name: Desplegar a Apps Script

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/server/**"
      - "src/web/**"
      - "scripts/build-appscript.mjs"
      - "scripts/check-project.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-appscript.yml"

concurrency:
  group: apps-script-production
  cancel-in-progress: false

env:
  EXPECTED_SCRIPT_ID: 1HFWb7JgrmhUb6bp8W-cztQHnQgFYX7-4K3d0nqen-008lqdnD1amb3l_
  PROTECTED_SCRIPT_ID: 1ew3Nqi0e8SHid_zWv1z5cl6ATCZzqVLqc2lkbfox5CMNsh8FH5tL8zKx

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm run check
      - name: Configurar clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          CLASP_JSON: ${{ secrets.CLASP_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::CLASPRC_JSON no esta configurado o esta vacio"
            exit 1
          fi
          if [ -z "$CLASP_JSON" ]; then
            echo "::error::CLASP_JSON no esta configurado o esta vacio"
            exit 1
          fi
          printf '%s' "$CLASPRC_JSON" > ~/.clasprc.json
          printf '%s' "$CLASP_JSON" > .clasp.json
          node -e "const fs = require('fs'); JSON.parse(fs.readFileSync(process.env.HOME + '/.clasprc.json', 'utf8')); const config = JSON.parse(fs.readFileSync('.clasp.json', 'utf8')); if (!config.scriptId) throw new Error('CLASP_JSON no contiene scriptId'); if (/^AKfy/.test(config.scriptId)) throw new Error('CLASP_JSON contiene un deploymentId, no un scriptId'); if (config.scriptId === process.env.PROTECTED_SCRIPT_ID) throw new Error('CLASP_JSON apunta al script protegido y el despliegue fue bloqueado'); if (config.scriptId !== process.env.EXPECTED_SCRIPT_ID) throw new Error('CLASP_JSON no apunta al script autorizado ' + process.env.EXPECTED_SCRIPT_ID); config.rootDir = 'dist'; fs.writeFileSync('.clasp.json', JSON.stringify(config, null, 2))"
      - name: Subir a Apps Script
        run: |
          set +e
          output=$(npx --yes @google/clasp push --force 2>&1)
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -ne 0 ]; then
            reason=$(printf '%s\n' "$output" | tail -n 5 | tr '\n' ' ')
            echo "::error title=clasp push::$reason"
            exit "$status"
          fi
      - name: Actualizar implementacion web
        env:
          APPS_SCRIPT_DEPLOYMENT_ID: AKfycbzI4pxkYSVAulRhlQC6WbtaMTQodqVMjGtK1v4HREi7Yoxq4yaWdbtOivXj3uMv623Dvw
        run: npx --yes @google/clasp deploy --deploymentId "$APPS_SCRIPT_DEPLOYMENT_ID" --description "GitHub $GITHUB_SHA"
