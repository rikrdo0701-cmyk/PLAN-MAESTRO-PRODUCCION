name: Desplegar a Apps Script

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/server/**"
      - "src/web/bridge/**"
      - "scripts/build-appscript.mjs"
      - "scripts/check-project.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-appscript.yml"

concurrency:
  group: apps-script-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - run: npm run check
      - name: Configurar clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          CLASP_JSON: ${{ secrets.CLASP_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::CLASPRC_JSON no esta configurado o esta vacio"
            exit 1
          fi
          if [ -z "$CLASP_JSON" ]; then
            echo "::error::CLASP_JSON no esta configurado o esta vacio"
            exit 1
          fi
          printf '%s' "$CLASPRC_JSON" > ~/.clasprc.json
          printf '%s' "$CLASP_JSON" > .clasp.json
          node -e "const fs = require('fs'); JSON.parse(fs.readFileSync(process.env.HOME + '/.clasprc.json', 'utf8')); const config = JSON.parse(fs.readFileSync('.clasp.json', 'utf8')); if (!config.scriptId) throw new Error('CLASP_JSON no contiene scriptId'); config.rootDir = 'dist'; fs.writeFileSync('.clasp.json', JSON.stringify(config, null, 2))"
      - name: Subir a Apps Script
        run: npx --yes @google/clasp push --force
      - name: Actualizar implementacion web
        env:
          APPS_SCRIPT_DEPLOYMENT_ID: AKfycbyCrdM3g-ixxjbvqjysQ7pdO59Bn6NQA6PECUC_YI-ByfwzC1ueWcQFx1hErWqTHVoSxw
        run: npx --yes @google/clasp deploy --deploymentId "$APPS_SCRIPT_DEPLOYMENT_ID" --description "GitHub $GITHUB_SHA"
